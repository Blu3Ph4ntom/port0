name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - "web/**"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - "web/**"
      - "docs/**"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run govulncheck
        continue-on-error: true
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Verify dependencies
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: go build -v ./...

      - name: Run Tests (with race detector)
        # Note: race detector requires CGO on some platforms,
        # but setup-go usually handles the toolchain correctly.
        run: go test -v -race "-coverprofile=coverage.txt" "-covermode=atomic" ./...

      - name: Check Formatting
        if: matrix.os == 'ubuntu-latest'
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted correctly:"
            gofmt -s -l .
            exit 1
          fi

      - name: Upload coverage to Codecov
        # Optional: enable if you have a Codecov token/account
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          file: ./coverage.txt
          fail_ci_if_error: false

  setup-smoke:
    name: Setup Smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Build port0 (non-Windows)
        if: matrix.os != 'windows-latest'
        run: go build -v -o port0 .

      - name: Build port0 (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: go build -v -o port0.exe .

      - name: Setup + Teardown (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo ./port0 setup
          test -f /etc/systemd/resolved.conf.d/port0.conf
          sudo ./port0 teardown
          test ! -f /etc/systemd/resolved.conf.d/port0.conf

      - name: Setup + Teardown (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          sudo ./port0 setup
          test -f /etc/resolver/web
          test -f /etc/resolver/local
          sudo ./port0 teardown
          test ! -f /etc/resolver/web
          test ! -f /etc/resolver/local

      - name: Setup + Teardown (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          .\port0.exe setup
          .\port0.exe teardown

  # Build verification for common architectures to ensure no platform-specific breakages
  build-check:
    name: Build Check (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true
      - name: Build Cross-Platform
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -v -o /dev/null .
