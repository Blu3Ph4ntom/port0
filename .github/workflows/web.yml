name: Web

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "go.work"
      - ".github/workflows/web.yml"
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - "go.work"
      - ".github/workflows/web.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "web-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.156.0"
          extended: true

      - name: Build
        run: hugo --source web --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
