run:
  timeout: 5m
  go: "1.24"
  tests: true

linters:
  disable-all: true
  enable:
    - gosimple # Specializes in simplifying code
    - govet # Reports suspicious constructs
    - ineffassign # Detects unused assignments
    - staticcheck # Go static analysis
    - unused # Checks for unused constants, variables, functions and types
    - bodyclose # Checks whether HTTP response body is closed
    - misspell # Finds commonly misspelled English words in comments
    - typecheck # Like the front-end of a Go compiler

linters-settings:
  govet:
    enable:
      - shadow # Reports variables that may have been unintentionally shadowed
  misspell:
    locale: US

issues:
  exclude-use-default: true
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - goconst
    # Allow simple shadowing that is common in Go
    - text: 'shadow: declaration of "err" shadows declaration'
      linters:
        - govet
    # Relax exported comments requirements (revive is disabled but for future-proofing)
    - text: "exported: (type|method|function|var|const) .* should have comment"
      linters:
        - revive
        - stylecheck
