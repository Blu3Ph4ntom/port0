run:
  timeout: 5m
  go: "1.24"
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - goconst
    - gocyclo
    - gofmt
    - gosec
    - misspell
    - revive
    - stylecheck
    - unconvert
    - unparam
    - whitespace

linters-settings:
  govet:
    enable:
      - fieldalignment
      - shadow
  gocyclo:
    min-complexity: 20
  revive:
    rules:
      - name: exported
        disabled: true
      - name: package-comments
        disabled: true
  goconst:
    min-len: 3
    min-occurrences: 3
  gosec:
    excludes:
      - G104 # Errors are checked by errcheck
      - G304 # File paths are often dynamic
  errcheck:
    # Ignore specific functions that are commonly ignored
    ignore: fmt:.*,io:Close,os:Remove.*,github.com/blu3ph4ntom/port0/internal/ipc:Write.*,github.com/blu3ph4ntom/port0/internal/ipc:SendRequest
  misspell:
    locale: US

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - goconst
        - gosec
        - dupl
        - errcheck
