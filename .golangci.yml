run:
  timeout: 5m
  go: "1.24"
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - goconst
    - gocyclo
    - gofmt
    - gosec
    - misspell
    - revive
    - stylecheck
    - unconvert
    - unparam
    - whitespace

linters-settings:
  govet:
    enable:
      - fieldalignment
      - shadow
  gocyclo:
    min-complexity: 20
  revive:
    rules:
      - name: exported
        disabled: true
      - name: package-comments
        disabled: true
  goconst:
    min-len: 3
    min-occurrences: 3
  gosec:
    excludes:
      - G104 # Errors are checked by errcheck
      - G304 # File paths are often dynamic
  errcheck:
    check-type-assertions: true
    exclude-functions:
      - (*encoding/json.Encoder).Encode
      - (*github.com/spf13/pflag.FlagSet).Parse
      - (github.com/blu3ph4ntom/port0/internal/ipc).WriteError
      - (github.com/blu3ph4ntom/port0/internal/ipc).WriteOK
      - (github.com/blu3ph4ntom/port0/internal/ipc).SendRequest
      - fmt.Fprintf
      - fmt.Printf
      - fmt.Println
      - io.Copy
      - os.Remove
      - os.RemoveAll
      - (net.Conn).Close
      - (net.Listener).Close
      - (*net/http.Server).Close
      - (io.ReadCloser).Close
      - (*os.File).Close
      - (*os.File).Seek
      - (*os.Process).Release
      - (*os.Process).Kill
      - (*os.Process).Signal
  misspell:
    locale: US

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - goconst
        - gosec
        - dupl
        - errcheck
