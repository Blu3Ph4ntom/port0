{{ define "main" }}
<div class="layout">
    <aside class="rail">
        <div class="brandmark">
            <span class="mark"></span>
            <div class="word">port0</div>
            <div class="kicker">No ports. Just names.</div>
        </div>

        <div class="theme-switch" role="group" aria-label="Theme">
            <button
                class="theme-option"
                type="button"
                data-theme-mode="system"
                aria-label="System"
            >
                <svg
                    viewBox="0 0 24 24"
                    aria-hidden="true"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.4"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <rect
                        x="2"
                        y="3"
                        width="20"
                        height="14"
                        rx="2"
                        ry="2"
                    ></rect>
                    <line x1="8" y1="21" x2="16" y2="21"></line>
                    <line x1="12" y1="17" x2="12" y2="21"></line>
                </svg>
            </button>
            <button
                class="theme-option"
                type="button"
                data-theme-mode="light"
                aria-label="Light"
            >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <circle
                        cx="12"
                        cy="12"
                        r="5"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.4"
                    />
                    <path
                        d="M12 3v3M12 18v3M3 12h3M18 12h3M5.2 5.2l2.1 2.1M16.7 16.7l2.1 2.1M18.8 5.2l-2.1 2.1M7.3 16.7l-2.1 2.1"
                        stroke="currentColor"
                        stroke-width="1.4"
                        stroke-linecap="round"
                    />
                </svg>
            </button>
            <button
                class="theme-option"
                type="button"
                data-theme-mode="dark"
                aria-label="Dark"
            >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path
                        d="M20 15.5a8 8 0 0 1-9.5-11 8.5 8.5 0 1 0 9.5 11z"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.4"
                    />
                </svg>
            </button>
        </div>

        <nav class="rail-nav" aria-label="Sections">
            <a href="#overview" data-section="overview">Overview</a>
            <a href="#install" data-section="install">Install</a>
            <a href="#quickstart" data-section="quickstart">Quick start</a>
            <a href="#subdomains" data-section="subdomains">Subdomains</a>
            <a href="#setup" data-section="setup">Setup</a>
            <a href="#commands" data-section="commands">Commands</a>
            <a href="#examples" data-section="examples">Examples</a>
        </nav>

        <div class="rail-links">
            <a
                class="external"
                href="https://github.com/blu3ph4ntom/port0"
                rel="noopener"
                target="_blank"
            >
                <span class="icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 2C6.5 2 2 6.6 2 12.2c0 4.4 2.9 8.1 6.9 9.4.5.1.7-.2.7-.5v-1.8c-2.8.6-3.4-1.4-3.4-1.4-.5-1.2-1.1-1.5-1.1-1.5-.9-.6.1-.6.1-.6 1 0 1.6 1.1 1.6 1.1.9 1.6 2.4 1.1 3 .8.1-.7.4-1.1.7-1.4-2.2-.3-4.6-1.1-4.6-5 0-1.1.4-2 1-2.7-.1-.3-.5-1.2.1-2.6 0 0 .8-.3 2.7 1a9.1 9.1 0 0 1 4.9 0c1.9-1.3 2.7-1 2.7-1 .6 1.4.2 2.3.1 2.6.6.7 1 1.6 1 2.7 0 3.9-2.4 4.7-4.7 5 .4.3.8 1 .8 2.1v3.1c0 .3.2.6.7.5 4-1.3 6.9-5 6.9-9.4C22 6.6 17.5 2 12 2z"
                            fill="currentColor"
                        />
                    </svg>
                </span>
                GitHub
            </a>
            <a
                class="external"
                href="https://twitter.com/Im_BluePhantom"
                rel="noopener"
                target="_blank"
            >
                <span class="icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M18.9 3.5h3l-6.5 7.4 7.6 9.6h-6l-4.7-6-5.2 6h-3l7-8-7.3-9.1h6l4.2 5.4 4.9-5.4zm-1.1 15h1.7L7.2 5.4H5.5l12.3 13.1z"
                            fill="currentColor"
                        />
                    </svg>
                </span>
                @Im_BluePhantom
            </a>
        </div>
    </aside>

    <div class="page">{{ .Content }}</div>
</div>

<script>
    (function () {
        // Theme Management
        const root = document.documentElement;
        const themeOptions = document.querySelectorAll(".theme-option");
        const storageKey = "port0-theme-mode";

        function applyTheme(mode) {
            if (mode === "system") {
                const prefersDark = window.matchMedia(
                    "(prefers-color-scheme: dark)",
                ).matches;
                root.setAttribute("data-theme", prefersDark ? "dark" : "light");
            } else {
                root.setAttribute("data-theme", mode);
            }
            localStorage.setItem(storageKey, mode);

            themeOptions.forEach((opt) => {
                opt.classList.toggle(
                    "is-active",
                    opt.dataset.themeMode === mode,
                );
            });
        }

        window
            .matchMedia("(prefers-color-scheme: dark)")
            .addEventListener("change", () => {
                if (localStorage.getItem(storageKey) === "system") {
                    applyTheme("system");
                }
            });

        themeOptions.forEach((opt) => {
            opt.addEventListener("click", () =>
                applyTheme(opt.dataset.themeMode),
            );
        });

        const savedTheme = localStorage.getItem(storageKey) || "system";
        applyTheme(savedTheme);

        // Section Switching
        const sections = document.querySelectorAll(".panel-section");
        const navLinks = document.querySelectorAll(".rail-nav a");

        function activateSection(id) {
            sections.forEach((sec) => {
                if (sec.getAttribute("id") === id) {
                    sec.style.display = "block";
                    setTimeout(() => sec.classList.add("is-active"), 10);
                } else {
                    sec.classList.remove("is-active");
                    sec.style.display = "none";
                }
            });
            navLinks.forEach((link) => {
                link.classList.toggle(
                    "is-active",
                    link.getAttribute("href") === "#" + id,
                );
            });
        }

        navLinks.forEach((link) => {
            link.addEventListener("click", function (e) {
                e.preventDefault();
                const targetId = this.getAttribute("href").substring(1);
                activateSection(targetId);
                history.replaceState(null, null, "#" + targetId);
            });
        });

        const hash = window.location.hash.substring(1);
        if (hash && document.getElementById(hash)) {
            activateSection(hash);
        } else {
            activateSection("overview");
        }

        // Copy Buttons
        document.querySelectorAll("pre").forEach((pre) => {
            const btn = document.createElement("button");
            btn.className = "copy-btn";
            btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
            btn.addEventListener("click", () => {
                const code = pre.querySelector("code")
                    ? pre.querySelector("code").innerText
                    : pre.innerText;
                navigator.clipboard.writeText(code);
                btn.classList.add("copied");
                setTimeout(() => btn.classList.remove("copied"), 2000);
            });
            pre.appendChild(btn);
        });
    })();
</script>
{{ end }}
