{{ define "main" }}

        <div class="theme-switch" role="group" aria-label="Theme">

            >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <circle
                        cx="12"
                        cy="12"
                        r="7"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.4"
                    />
                    <path
                        d="M12 5v2M12 17v2M5 12h2M17 12h2"
                        stroke="currentColor"
                        stroke-width="1.4"
                        stroke-linecap="round"
                    />
                </svg>
            </button>
            <button
                class="theme-option"
                type="button"
                data-theme-mode="light"
                aria-label="Light"
            >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <circle
                        cx="12"
                        cy="12"
                        r="5"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.4"
                    />
                    <path
                        d="M12 3v3M12 18v3M3 12h3M18 12h3M5.2 5.2l2.1 2.1M16.7 16.7l2.1 2.1M18.8 5.2l-2.1 2.1M7.3 16.7l-2.1 2.1"
                        stroke="currentColor"
                        stroke-width="1.4"
                        stroke-linecap="round"
                    />
                </svg>
            </button>
            <button
                class="theme-option"
                type="button"
                data-theme-mode="dark"
                aria-label="Dark"
            >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path
                        d="M20 15.5a8 8 0 0 1-9.5-11 8.5 8.5 0 1 0 9.5 11z"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.4"
                    />
                </svg>

        </div>

        <nav class="rail-nav" aria-label="Sections">
            <a href="#overview" data-section="overview">Overview</a>
            <a href="#install" data-section="install">Install</a>
            <a href="#quickstart" data-section="quickstart">Quick start</a>
            <a href="#subdomains" data-section="subdomains">Subdomains</a>
            <a href="#setup" data-section="setup">Setup</a>
            <a href="#commands" data-section="commands">Commands</a>
            <a href="#examples" data-section="examples">Examples</a>

        <div class="rail-links">

                target="_blank"

                rel="noopener"
                target="_blank"

                        <path

        </div>
    </aside>

    <div class="page">{{ .Content }}</div>
</div>

<script>
    (function () {
        // Theme Management
        const root = document.documentElement;
        const themeOptions = document.querySelectorAll(".theme-option");
        const storageKey = "port0-theme-mode";

        function applyTheme(mode) {
            if (mode === "system") {
                root.removeAttribute("data-theme");
            } else {
                root.setAttribute("data-theme", mode);
            }
            localStorage.setItem(storageKey, mode);

            themeOptions.forEach((opt) => {
                opt.classList.toggle(
                    "is-active",
                    opt.dataset.themeMode === mode,
                );
            });
        }

        themeOptions.forEach((opt) => {
            opt.addEventListener("click", () =>
                applyTheme(opt.dataset.themeMode),
            );
        });

        const savedTheme = localStorage.getItem(storageKey) || "system";
        applyTheme(savedTheme);

        // Intersection Observer for Nav
        const sections = document.querySelectorAll(".panel-section");
        const navLinks = document.querySelectorAll(".rail-nav a");

        const observerOptions = {
            root: null,
            rootMargin: "-20% 0px -70% 0px",
            threshold: 0,
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    const id = entry.target.getAttribute("id");
                    navLinks.forEach((link) => {
                        link.classList.toggle(
                            "is-active",
                            link.getAttribute("href") === "#" + id,
                        );
                    });
                    sections.forEach((sec) => {
                        sec.classList.toggle(
                            "is-active",
                            sec.getAttribute("id") === id,
                        );
                    });
                }
            });
        }, observerOptions);

        sections.forEach((section) => observer.observe(section));

        // Smooth Scroll for Internal Links
        document.querySelectorAll('a[href^="#"]').forEach((anchor) => {
            anchor.addEventListener("click", function (e) {
                e.preventDefault();
                const targetId = this.getAttribute("href").substring(1);
                const targetElement = document.getElementById(targetId);
                if (targetElement) {
                    window.scrollTo({
                        top: targetElement.offsetTop - 32,
                        behavior: "smooth",
                    });
                    history.pushState(null, null, "#" + targetId);
                }
            });
        });
    })();
</script>
{{ end }}
